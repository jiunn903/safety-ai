<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工安助手 - AI 深度分析</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // 從全域 Lucide 物件解構圖示
        const { 
            ShieldAlert, Target, Lightbulb, Loader2, 
            CheckCircle2, AlertCircle, Sparkles, Activity,
            Zap, Cpu, ShieldCheck, RefreshCw, AlertTriangle, UserX 
        } = lucide;

        // --- Firebase 配置 ---
        // 注意：在 GitHub Pages 部署時，您需要替換為真實的 Firebase 專案資訊
        // 否則分析功能將無法在外部環境運行
        const firebaseConfig = {
            apiKey: "", // 這裡需填入您的 Firebase API Key
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [formData, setFormData] = React.useState({
                description: '',
                analysis: null
            });

            // 指數退避重試
            const delays = [1000, 2000, 4000, 8000];

            const handleAnalyze = async () => {
                if (!formData.description.trim()) return;
                setLoading(true);
                setError(null);

                const apiKey = ""; // 部署到 GitHub 後，您需要在此填入 Gemini API Key
                const systemPrompt = "你是資深工安專家。分析意外事件並提供專業的「三因分析」（直接原因、間接原因、基本原因）與改善建議。其中「間接原因」必須明確分為「不安全的狀況」與「不安全的行為」。請務必回傳符合 schema 的繁體中文 JSON。";

                for (let i = 0; i <= delays.length; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `分析內容：${formData.description}` }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: {
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            directCauses: { type: "ARRAY", items: { type: "STRING" } },
                                            unsafeConditions: { type: "ARRAY", items: { type: "STRING" } },
                                            unsafeActs: { type: "ARRAY", items: { type: "STRING" } },
                                            basicCauses: { type: "ARRAY", items: { type: "STRING" } },
                                            countermeasures: { type: "ARRAY", items: { type: "STRING" } },
                                            riskLevel: { type: "STRING", enum: ["高", "中", "低"] }
                                        },
                                        required: ["directCauses", "unsafeConditions", "unsafeActs", "basicCauses", "countermeasures", "riskLevel"]
                                    }
                                }
                            })
                        });

                        if (!response.ok) throw new Error("API 請求失敗");
                        const result = await response.json();
                        const data = JSON.parse(result.candidates[0].content.parts[0].text);
                        setFormData(prev => ({ ...prev, analysis: data }));
                        setLoading(false);
                        return;
                    } catch (err) {
                        if (i === delays.length) {
                            setError("AI 服務忙碌中，請確認 API Key 是否設定正確並稍後再試。");
                            setLoading(false);
                        } else {
                            await new Promise(res => setTimeout(res, delays[i]));
                        }
                    }
                }
            };

            const handleReset = () => {
                setFormData({ description: '', analysis: null });
                setError(null);
            };

            const { useState } = React;

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 flex flex-col md:flex-row font-sans text-sm">
                    {/* 側邊欄 */}
                    <aside className="w-full md:w-64 bg-white border-b md:border-r border-slate-200 p-6 flex flex-col shadow-sm">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white shadow-lg">
                                <ShieldAlert size={24} />
                            </div>
                            <h1 className="text-xl font-bold text-slate-800">工安助手</h1>
                        </div>
                        <div className="flex-grow">
                            <div className="px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold flex items-center gap-3 border border-indigo-100">
                                <Sparkles size={18} /> 公開部署版
                            </div>
                        </div>
                        <div className="mt-auto pt-6 border-t border-slate-100">
                            <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <Activity size={12} className="text-indigo-400" /> Web Deployment Mode
                            </div>
                        </div>
                    </aside>

                    {/* 主內容區 */}
                    <main className="flex-grow p-6 md:p-10 max-w-5xl mx-auto w-full">
                        <header className="mb-8">
                            <h2 className="text-3xl font-bold text-slate-800">工安事件診斷報告</h2>
                            <p className="text-slate-500 mt-2 font-medium">輸入事故經過，由 AI 進行專業的三因分析。</p>
                        </header>

                        {error && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl flex items-center gap-3">
                                <AlertCircle size={20} className="shrink-0" />
                                <div className="font-bold">{error}</div>
                                <button onClick={() => setError(null)} className="ml-auto"><RefreshCw size={16} /></button>
                            </div>
                        )}

                        <div className="space-y-6">
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center mb-4">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">事件描述</label>
                                    <button onClick={handleReset} className="text-xs text-slate-400 hover:text-indigo-600 font-bold px-2 py-1">清空重置</button>
                                </div>
                                <textarea 
                                    placeholder="請輸入事故描述..."
                                    value={formData.description}
                                    onChange={e => setFormData({...formData, description: e.target.value})}
                                    disabled={loading}
                                    className="w-full h-40 p-5 rounded-xl border border-slate-200 bg-slate-50 focus:border-indigo-500 outline-none resize-none transition-all text-slate-700"
                                />
                                <button 
                                    onClick={handleAnalyze}
                                    disabled={loading || !formData.description.trim()}
                                    className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg disabled:opacity-50 transition-all flex items-center justify-center gap-2"
                                >
                                    {loading ? <Loader2 size={20} className="animate-spin" /> : <Target size={20} />}
                                    {loading ? "分析中..." : "啟動 AI 深度分析"}
                                </button>
                            </div>

                            {formData.analysis && (
                                <div className="bg-white rounded-2xl p-8 shadow-md border border-slate-200">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b">
                                        <h3 className="text-xl font-bold text-slate-800">事故診斷報告</h3>
                                        <div className="px-4 py-1.5 rounded-full text-xs font-black bg-indigo-100 text-indigo-600 border border-indigo-200">
                                            風險評級：{formData.analysis.riskLevel}
                                        </div>
                                    </div>

                                    <div className="grid md:grid-cols-3 gap-6 mb-10">
                                        <div className="bg-rose-50/30 p-5 rounded-2xl border border-rose-100/50">
                                            <h4 className="flex items-center gap-2 text-xs font-black text-rose-600 mb-4 uppercase tracking-widest"><Zap size={16} /> 直接原因</h4>
                                            <ul className="space-y-3">{formData.analysis.directCauses.map((c, i) => (<li key={i} className="text-sm text-slate-700 leading-relaxed pl-3 border-l-2 border-rose-300">"{c}"</li>))}</ul>
                                        </div>
                                        <div className="bg-amber-50/30 p-5 rounded-2xl border border-amber-100/50">
                                            <h4 className="flex items-center gap-2 text-xs font-black text-amber-600 mb-4 uppercase tracking-widest"><Cpu size={16} /> 間接原因</h4>
                                            <div className="space-y-4">
                                                <div>
                                                    <p className="text-[10px] font-bold text-amber-700 mb-2">● 不安全的狀況</p>
                                                    <ul className="space-y-2">{formData.analysis.unsafeConditions.map((c, i) => (<li key={i} className="text-sm text-slate-700 pl-3 border-l-2 border-amber-300">{c}</li>))}</ul>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] font-bold text-amber-700 mb-2">● 不安全的行為</p>
                                                    <ul className="space-y-2">{formData.analysis.unsafeActs.map((c, i) => (<li key={i} className="text-sm text-slate-700 pl-3 border-l-2 border-amber-300">{c}</li>))}</ul>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-indigo-50/30 p-5 rounded-2xl border border-indigo-100/50">
                                            <h4 className="flex items-center gap-2 text-xs font-black text-indigo-600 mb-4 uppercase tracking-widest"><ShieldCheck size={16} /> 基本原因</h4>
                                            <ul className="space-y-3">{formData.analysis.basicCauses.map((c, i) => (<li key={i} className="text-sm text-slate-700 leading-relaxed pl-3 border-l-2 border-indigo-300">{c}</li>))}</ul>
                                        </div>
                                    </div>

                                    <section className="bg-emerald-50/40 p-6 rounded-2xl border border-emerald-100/60">
                                        <h4 className="flex items-center gap-2 text-sm font-black text-emerald-700 mb-6 uppercase tracking-widest"><Lightbulb size={20} /> 建議改善對策</h4>
                                        <div className="grid md:grid-cols-2 gap-4">{formData.analysis.countermeasures.map((m, i) => (<div key={i} className="bg-white p-4 rounded-xl border border-emerald-100 flex items-start gap-3 shadow-sm"><CheckCircle2 size={18} className="text-emerald-500 mt-0.5 shrink-0" /><span className="text-sm text-slate-700 font-semibold">{m}</span></div>))}</div>
                                    </section>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
