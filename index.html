<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工安助手 - AI 深度分析</title>
    <!-- 僅保留核心依賴，移除 Lucide 以避免報錯 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <div class="text-slate-400 font-bold">系統啟動中...</div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        // 簡化圖示組件：使用 Emoji 確保 100% 執行成功，不再依賴外部庫
        const Icon = ({ name, className = "" }) => {
            const icons = {
                ShieldAlert: "🛡️",
                Sparkles: "✨",
                Activity: "📈",
                AlertCircle: "⚠️",
                RefreshCw: "🔄",
                Loader2: "⏳",
                Target: "🎯",
                Zap: "⚡",
                Cpu: "⚙️",
                ShieldCheck: "✅",
                Lightbulb: "💡",
                CheckCircle2: "✔️"
            };
            return <span className={className} style={{ fontSize: '1.2em', lineHeight: '1' }}>{icons[name] || "•"}</span>;
        };

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [formData, setFormData] = useState({
                description: '',
                analysis: null
            });

            const handleAnalyze = async () => {
                if (!formData.description.trim()) return;
                setLoading(true);
                setError(null);

                // --- 重要：請在此填入您的 Gemini API Key ---
                const apiKey = "AIzaSyCa1uWx9QObYc62yKB8fx4Yg09FKxCBgcU"; 
                
                if (!apiKey) {
                    setError("尚未設定 API Key。請編輯 index.html 並填入您的 Gemini API Key。");
                    setLoading(false);
                    return;
                }

                const systemPrompt = "你是資深工安專家。分析意外事件並提供專業的「三因分析」（直接、間接、基本原因）與改善建議。間接原因須分為「不安全的狀況」與「不安全的行為」。請回傳繁體中文 JSON。";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `分析內容：${formData.description}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        directCauses: { type: "ARRAY", items: { type: "STRING" } },
                                        unsafeConditions: { type: "ARRAY", items: { type: "STRING" } },
                                        unsafeActs: { type: "ARRAY", items: { type: "STRING" } },
                                        basicCauses: { type: "ARRAY", items: { type: "STRING" } },
                                        countermeasures: { type: "ARRAY", items: { type: "STRING" } },
                                        riskLevel: { type: "STRING", enum: ["高", "中", "低"] }
                                    },
                                    required: ["directCauses", "unsafeConditions", "unsafeActs", "basicCauses", "countermeasures", "riskLevel"]
                                }
                            }
                        })
                    });

                    if (!response.ok) throw new Error("API 請求異常: " + response.status);
                    const result = await response.json();
                    const data = JSON.parse(result.candidates[0].content.parts[0].text);
                    setFormData(prev => ({ ...prev, analysis: data }));
                } catch (err) {
                    setError("診斷發生錯誤：" + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 flex flex-col md:flex-row text-sm animate-in fade-in duration-500">
                    <aside className="w-full md:w-64 bg-white border-b md:border-r border-slate-200 p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white shadow-lg flex items-center justify-center">
                                <Icon name="ShieldAlert" />
                            </div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">工安助手</h1>
                        </div>
                        <div className="px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold flex items-center gap-3 border border-indigo-100">
                            <Icon name="Sparkles" /> 深度分析模式
                        </div>
                        <div className="mt-auto pt-6 border-t border-slate-100">
                            <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <Icon name="Activity" /> 參考版
                            </div>
                        </div>
                    </aside>

                    <main className="flex-grow p-6 md:p-10 max-w-5xl mx-auto w-full">
                        <header className="mb-8">
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight">事故診斷報告</h2>
                            <p className="text-slate-500 mt-2 font-medium">由 AI 進行專業的三因分析與對策建議。</p>
                        </header>

                        {error && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl flex items-center gap-3 shadow-sm">
                                <Icon name="AlertCircle" />
                                <div className="font-bold">{error}</div>
                                <button onClick={() => setError(null)} className="ml-auto p-1 hover:bg-red-100 rounded">
                                    <Icon name="RefreshCw" />
                                </button>
                            </div>
                        )}

                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest">事件經過描述</label>
                                <button onClick={() => setFormData({description:'', analysis:null})} className="text-xs text-slate-400 hover:text-indigo-600 font-bold px-2 py-1">清空</button>
                            </div>
                            <textarea 
                                placeholder="請描述事故細節..."
                                value={formData.description}
                                onChange={e => setFormData({...formData, description: e.target.value})}
                                disabled={loading}
                                className="w-full h-40 p-5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none resize-none transition-all text-slate-700 font-medium"
                            />
                            <button 
                                onClick={handleAnalyze}
                                disabled={loading || !formData.description.trim()}
                                className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg disabled:opacity-50 flex items-center justify-center gap-3 transition-all active:scale-[0.98]"
                            >
                                {loading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Target" />}
                                {loading ? "正在生成報告..." : "啟動 AI 診斷"}
                            </button>
                        </div>

                        {formData.analysis && (
                            <div className="bg-white rounded-2xl p-8 shadow-md border border-slate-200 animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center mb-8 pb-4 border-b">
                                    <div className="flex items-center gap-3">
                                        <div className="w-2 h-8 bg-indigo-600 rounded-full" />
                                        <h3 className="text-xl font-bold text-slate-800">分析摘要</h3>
                                    </div>
                                    <div className={`px-4 py-1.5 rounded-full text-xs font-black tracking-wide border ${
                                        formData.analysis.riskLevel === '高' ? 'bg-red-50 text-red-600 border-red-200' : 
                                        formData.analysis.riskLevel === '中' ? 'bg-amber-50 text-amber-600 border-amber-200' : 
                                        'bg-emerald-50 text-emerald-600 border-emerald-200'
                                    }`}>
                                        風險級別：{formData.analysis.riskLevel}
                                    </div>
                                </div>
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="p-5 bg-rose-50/50 rounded-xl border border-rose-100 flex flex-col">
                                        <h4 className="text-rose-600 font-black mb-4 flex items-center gap-2 uppercase tracking-wider"><Icon name="Zap" />直接原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow">{formData.analysis.directCauses.map((c,i)=><li key={i} className="pl-2 border-l-2 border-rose-200 italic">"{c}"</li>)}</ul>
                                    </div>
                                    <div className="p-5 bg-amber-50/50 rounded-xl border border-amber-100 flex flex-col">
                                        <h4 className="text-amber-600 font-black mb-4 flex items-center gap-2 uppercase tracking-wider"><Icon name="Cpu" />間接原因</h4>
                                        <div className="space-y-4">
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-700 mb-2 uppercase tracking-widest">狀況與行為</p>
                                                <ul className="space-y-2 text-slate-700">{[...formData.analysis.unsafeConditions, ...formData.analysis.unsafeActs].map((c,i)=><li key={i} className="pl-2 border-l-2 border-amber-200 font-medium">{c}</li>)}</ul>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-5 bg-indigo-50/50 rounded-xl border border-indigo-100 flex flex-col">
                                        <h4 className="text-indigo-600 font-black mb-4 flex items-center gap-2 uppercase tracking-wider"><Icon name="ShieldCheck" />基本原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow">{formData.analysis.basicCauses.map((c,i)=><li key={i} className="pl-2 border-l-2 border-indigo-200 font-medium">{c}</li>)}</ul>
                                    </div>
                                </div>
                                <div className="mt-10 p-6 bg-emerald-50/50 rounded-xl border border-emerald-100">
                                    <h4 className="text-emerald-800 font-black mb-6 flex items-center gap-2 uppercase tracking-widest"><Icon name="Lightbulb" />建議改善對策</h4>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        {formData.analysis.countermeasures.map((m,i)=>(
                                            <div key={i} className="bg-white p-4 rounded-xl border border-emerald-100/50 text-slate-700 shadow-sm font-medium flex gap-3">
                                                <Icon name="CheckCircle2" />
                                                <span>{m}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
