<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工安助手 - AI 深度分析</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <!-- 加入一個初始的 Loading 提示，若腳本執行成功會被 React 覆蓋 -->
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-slate-400 animate-pulse font-medium text-lg">系統載入中...</div>
        </div>
    </div>

    <script type="text/babel">
        // 確保 React Hook 在最上方宣告
        const { useState, useEffect } = React;

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [formData, setFormData] = useState({
                description: '',
                analysis: null
            });

            // 修正：動態讀取 Lucide 圖示的組件
            const Icon = ({ name, size = 20, className = "" }) => {
                const [svg, setSvg] = useState("");
                useEffect(() => {
                    const renderIcon = () => {
                        if (window.lucide && window.lucide.icons[name]) {
                            const iconSvg = window.lucide.icons[name].toSvg({
                                width: size,
                                height: size,
                                class: className,
                                'stroke-width': 2
                            });
                            setSvg(iconSvg);
                        }
                    };
                    
                    // 初始嘗試
                    renderIcon();
                    
                    // 如果 lucide 還沒載入，稍後再試一次
                    if (!window.lucide) {
                        const timer = setTimeout(renderIcon, 500);
                        return () => clearTimeout(timer);
                    }
                }, [name, size, className]);
                
                return svg ? <span dangerouslySetInnerHTML={{ __html: svg }} className="inline-block leading-none" /> : <span style={{ width: size, height: size }} className="inline-block" />;
            };

            const delays = [1000, 2000, 4000, 8000];

            const handleAnalyze = async () => {
                if (!formData.description.trim()) return;
                setLoading(true);
                setError(null);

                // --- 重要提醒：請在此填入您的 API Key ---
                const apiKey = ""; 
                const systemPrompt = "你是資深工安專家。分析意外事件並提供專業的「三因分析」（直接原因、間接原因、基本原因）與改善建議。其中「間接原因」必須明確分為「不安全的狀況」與「不安全的行為」。請務必回傳符合 schema 的繁體中文 JSON。";

                for (let i = 0; i <= delays.length; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `分析內容：${formData.description}` }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: {
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            directCauses: { type: "ARRAY", items: { type: "STRING" } },
                                            unsafeConditions: { type: "ARRAY", items: { type: "STRING" } },
                                            unsafeActs: { type: "ARRAY", items: { type: "STRING" } },
                                            basicCauses: { type: "ARRAY", items: { type: "STRING" } },
                                            countermeasures: { type: "ARRAY", items: { type: "STRING" } },
                                            riskLevel: { type: "STRING", enum: ["高", "中", "低"] }
                                        },
                                        required: ["directCauses", "unsafeConditions", "unsafeActs", "basicCauses", "countermeasures", "riskLevel"]
                                    }
                                }
                            })
                        });

                        if (!response.ok) throw new Error("API 請求失敗");
                        const result = await response.json();
                        const data = JSON.parse(result.candidates[0].content.parts[0].text);
                        setFormData(prev => ({ ...prev, analysis: data }));
                        setLoading(false);
                        return;
                    } catch (err) {
                        if (i === delays.length) {
                            setError("AI 服務忙碌中，請檢查 API Key 是否正確並重新嘗試。");
                            setLoading(false);
                        } else {
                            await new Promise(res => setTimeout(res, delays[i]));
                        }
                    }
                }
            };

            const handleReset = () => {
                setFormData({ description: '', analysis: null });
                setError(null);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 flex flex-col md:flex-row text-sm">
                    {/* 側邊欄 */}
                    <aside className="w-full md:w-64 bg-white border-b md:border-r border-slate-200 p-6 flex flex-col shadow-sm">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white shadow-lg shadow-indigo-100">
                                <Icon name="ShieldAlert" size={24} />
                            </div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">工安助手</h1>
                        </div>
                        <div className="flex-grow">
                            <div className="px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold flex items-center gap-3 border border-indigo-100">
                                <Icon name="Sparkles" size={18} /> 深度分析模式
                            </div>
                        </div>
                        <div className="mt-auto pt-6 border-t border-slate-100">
                            <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <Icon name="Activity" size={12} className="text-indigo-400" /> Web Deployment v2.7
                            </div>
                        </div>
                    </aside>

                    {/* 主內容區 */}
                    <main className="flex-grow p-6 md:p-10 max-w-5xl mx-auto w-full">
                        <header className="mb-8">
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight">事故診斷報告</h2>
                            <p className="text-slate-500 mt-2 font-medium">請輸入事故經過，由 AI 進行專業的三因歸因分析。</p>
                        </header>

                        {error && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl flex items-center gap-3 shadow-sm">
                                <Icon name="AlertCircle" size={20} className="shrink-0" />
                                <div className="font-bold">{error}</div>
                                <button onClick={() => setError(null)} className="ml-auto hover:bg-red-100 p-1 rounded transition-colors">
                                    <Icon name="RefreshCw" size={16} />
                                </button>
                            </div>
                        )}

                        <div className="space-y-6">
                            {/* 輸入面板 */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center mb-4">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">事件描述 / Description</label>
                                    <button onClick={handleReset} className="text-xs text-slate-400 hover:text-indigo-600 font-bold px-2 py-1 hover:bg-slate-50 rounded transition-colors">清空重置</button>
                                </div>
                                <textarea 
                                    placeholder="例如：員工在二樓維修時，因梯子未穩固且地上有油漬導致滑倒..."
                                    value={formData.description}
                                    onChange={e => setFormData({...formData, description: e.target.value})}
                                    disabled={loading}
                                    className="w-full h-40 p-5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white outline-none resize-none transition-all text-slate-700 leading-relaxed font-medium"
                                />
                                <button 
                                    onClick={handleAnalyze}
                                    disabled={loading || !formData.description.trim()}
                                    className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                                >
                                    {loading ? <Icon name="Loader2" size={20} className="animate-spin" /> : <Icon name="Target" size={20} />}
                                    {loading ? "AI 分析中..." : "啟動 AI 深度分析"}
                                </button>
                            </div>

                            {/* 結果區塊 */}
                            {formData.analysis && (
                                <div className="bg-white rounded-2xl p-8 shadow-md border border-slate-200">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b">
                                        <div className="flex items-center gap-3">
                                            <div className="w-2 h-8 bg-indigo-600 rounded-full" />
                                            <h3 className="text-xl font-bold text-slate-800">事故分析結果</h3>
                                        </div>
                                        <div className={`px-4 py-1.5 rounded-full text-xs font-black tracking-wide border ${
                                            formData.analysis.riskLevel === '高' ? 'bg-red-100 text-red-600 border-red-200' : 
                                            formData.analysis.riskLevel === '中' ? 'bg-amber-100 text-amber-600 border-amber-200' : 
                                            'bg-emerald-100 text-emerald-600 border-emerald-200'
                                        }`}>
                                            風險評級：{formData.analysis.riskLevel}
                                        </div>
                                    </div>

                                    <div className="grid md:grid-cols-3 gap-6 mb-10">
                                        <div className="bg-rose-50/30 p-5 rounded-2xl border border-rose-100/50">
                                            <h4 className="flex items-center gap-2 text-xs font-black text-rose-600 mb-4 uppercase tracking-widest"><Icon name="Zap" size={16} /> 直接原因</h4>
                                            <ul className="space-y-3">{formData.analysis.directCauses.map((c, i) => (<li key={i} className="text-sm text-slate-700 leading-relaxed pl-3 border-l-2 border-rose-300 italic">"{c}"</li>))}</ul>
                                        </div>
                                        <div className="bg-amber-50/30 p-5 rounded-2xl border border-amber-100/50">
                                            <h4 className="flex items-center gap-2 text-xs font-black text-amber-600 mb-4 uppercase tracking-widest"><Icon name="Cpu" size={16} /> 間接原因</h4>
                                            <div className="space-y-4">
                                                <div>
                                                    <p className="text-[10px] font-bold text-amber-700 mb-2">● 不安全的狀況 (環境)</p>
                                                    <ul className="space-y-2">{formData.analysis.unsafeConditions.map((c, i) => (<li key={i} className="text-sm text-slate-700 pl-3 border-l-2 border-amber-300 font-medium">{c}</li>))}</ul>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] font-bold text-amber-700 mb-2">● 不安全的行為 (人為)</p>
                                                    <ul className="space-y-2">{formData.analysis.unsafeActs.map((c, i) => (<li key={i} className="text-sm text-slate-700 pl-3 border-l-2 border-amber-300 font-medium">{c}</li>))}</ul>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-indigo-50/30 p-5 rounded-2xl border border-indigo-100/50">
                                            <h4 className="flex items-center gap-2 text-xs font-black text-indigo-600 mb-4 uppercase tracking-widest"><Icon name="ShieldCheck" size={16} /> 基本原因</h4>
                                            <ul className="space-y-3">{formData.analysis.basicCauses.map((c, i) => (<li key={i} className="text-sm text-slate-700 leading-relaxed pl-3 border-l-2 border-indigo-300 font-medium">{c}</li>))}</ul>
                                        </div>
                                    </div>

                                    <section className="bg-emerald-50/40 p-6 rounded-2xl border border-emerald-100/60">
                                        <h4 className="flex items-center gap-2 text-sm font-black text-emerald-700 mb-6 uppercase tracking-widest"><Icon name="Lightbulb" size={20} /> 建議改善對策</h4>
                                        <div className="grid md:grid-cols-2 gap-4">{formData.analysis.countermeasures.map((m, i) => (<div key={i} className="bg-white p-4 rounded-xl border border-emerald-100 flex items-start gap-3 shadow-sm"><Icon name="CheckCircle2" size={18} className="text-emerald-500 mt-0.5 shrink-0" /><span className="text-sm text-slate-700 font-semibold">{m}</span></div>))}</div>
                                    </section>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
