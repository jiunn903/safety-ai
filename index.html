<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工安助手 - AI 深度分析系統</title>
    <!-- 核心依賴 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <div class="text-slate-400 font-bold text-lg">系統版本 v3.8 載入中...</div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, className = "" }) => {
            const icons = {
                ShieldAlert: "🛡️", Sparkles: "✨", Activity: "📈", AlertCircle: "⚠️",
                RefreshCw: "🔄", Loader2: "⏳", Target: "🎯", Zap: "⚡",
                Cpu: "⚙️", ShieldCheck: "✅", Lightbulb: "💡", CheckCircle2: "✔️",
                UserX: "👤", AlertTriangle: "🚧", Info: "ℹ️"
            };
            return <span className={`inline-block leading-none ${className}`} style={{ fontSize: '1.2em' }}>{icons[name] || "•"}</span>;
        };

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [diagnosing, setDiagnosing] = useState(false);
            const [error, setError] = useState(null);
            const [diagResult, setDiagResult] = useState(null);
            const [formData, setFormData] = useState({
                description: '',
                analysis: null
            });

            // 🔑 填寫位置
            const rawApiKey = "AIzaSyDV4m5jAx6dHLpydhST2DwhxxzEEeWH_9g"; 
            const apiKey = rawApiKey.trim();

            // 診斷功能：檢查可用模型
            const runDiagnostic = async () => {
                setDiagnosing(true);
                setDiagResult(null);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const data = await response.json();
                    if (data.models) {
                        const modelNames = data.models.map(m => m.name.split('/').pop()).join(', ');
                        setDiagResult(`診斷成功！您的 Key 可用模型包含: ${modelNames}`);
                    } else {
                        setDiagResult(`診斷失敗: 無法獲取模型列表。原因: ${JSON.stringify(data.error)}`);
                    }
                } catch (err) {
                    setDiagResult(`診斷異常: ${err.message}`);
                }
                setDiagnosing(false);
            };

            const handleAnalyze = async () => {
                if (!formData.description.trim()) return;
                setLoading(true);
                setError(null);
                setDiagResult(null);

                if (!apiKey || apiKey === "") {
                    setError("尚未正確設定 API Key。請編輯 index.html 第 41 行。");
                    setLoading(false);
                    return;
                }

                // 備援策略：嘗試多個版本與模型變體
                const strategies = [
                    { version: 'v1beta', model: 'gemini-1.5-flash' },
                    { version: 'v1beta', model: 'gemini-1.5-flash-latest' },
                    { version: 'v1', model: 'gemini-1.5-flash' },
                    { version: 'v1beta', model: 'gemini-1.5-pro' }
                ];

                const fullPrompt = `你是一位資深工安專家。分析以下意外事件並提供專業的「三因分析」（直接原因、間接原因、基本原因）與改善建議。
                分析要求：
                1. 「間接原因」明確分為「不安全的狀況」與「不安全的行為」。
                2. 風險級別選「高、中、低」。
                3. 回覆繁體中文。
                4. 只回覆 JSON 格式，不帶 Markdown 標籤。
                結構範例：{"directCauses":[],"unsafeConditions":[],"unsafeActs":[],"basicCauses":[],"countermeasures":[],"riskLevel":""}
                事件描述：${formData.description}`;

                let lastError = "";

                for (const strategy of strategies) {
                    try {
                        const apiEndpoint = `https://generativelanguage.googleapis.com/${strategy.version}/models/${strategy.model}:generateContent?key=${apiKey}&_=${Date.now()}`;
                        
                        const response = await fetch(apiEndpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: fullPrompt }] }]
                            })
                        });

                        const result = await response.json();

                        if (!response.ok) {
                            lastError = `${strategy.version}/${strategy.model} -> ${result.error?.message || response.status}`;
                            continue;
                        }
                        
                        let text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!text) continue;

                        text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                        const data = JSON.parse(text);
                        setFormData(prev => ({ ...prev, analysis: data }));
                        setLoading(false);
                        return;
                    } catch (err) {
                        lastError = err.message;
                        continue;
                    }
                }

                setError(`連線失敗。嘗試了 4 種備援方案皆失敗。最後錯誤: ${lastError}`);
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row text-sm">
                    <aside className="w-full md:w-64 bg-white border-b md:border-r border-slate-200 p-6 flex flex-col shadow-sm">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-indigo-600 p-2 rounded-lg shadow-lg flex items-center justify-center">
                                <Icon name="ShieldAlert" className="text-white" />
                            </div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">工安助手</h1>
                        </div>
                        <div className="px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold flex items-center gap-3 border border-indigo-100 mb-2">
                            <Icon name="Sparkles" /> AI 終極穩定系統
                        </div>
                        <div className="mt-4 px-4 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                            Version 3.8 Stable
                        </div>
                        <div className="mt-auto pt-6 border-t border-slate-100">
                             <button 
                                onClick={runDiagnostic}
                                disabled={diagnosing}
                                className="w-full py-2 text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-lg font-bold flex items-center justify-center gap-2"
                             >
                                {diagnosing ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Activity" />}
                                {diagnosing ? "診斷中..." : "執行連線診斷"}
                             </button>
                        </div>
                    </aside>

                    <main className="flex-grow p-6 md:p-10 max-w-5xl mx-auto w-full animate-in fade-in duration-500">
                        <header className="mb-8">
                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">事故診斷報告</h2>
                            <p className="text-slate-500 mt-2 font-medium italic">透過多重路徑備援技術優化連線成功率。</p>
                        </header>

                        {error && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl shadow-sm">
                                <div className="flex items-center gap-3 mb-2">
                                    <Icon name="AlertCircle" />
                                    <div className="font-bold">連線異常 (Error 404/403)</div>
                                    <button onClick={() => setError(null)} className="ml-auto p-1 hover:bg-red-100 rounded"><Icon name="RefreshCw" /></button>
                                </div>
                                <div className="text-xs bg-white/50 p-2 rounded border border-red-100 font-mono break-all">{error}</div>
                                <div className="mt-3 text-[11px] text-red-500">
                                    提示：如果持續報錯，請點選左側「執行連線診斷」確認您的模型名稱是否相符。
                                </div>
                            </div>
                        )}

                        {diagResult && (
                            <div className="mb-6 p-4 bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-xl text-xs font-mono shadow-sm animate-in slide-in-from-top-2">
                                <div className="flex items-center gap-2 mb-1 font-bold">
                                    <Icon name="Info" className="text-[14px]" /> 診斷數據回傳：
                                </div>
                                {diagResult}
                            </div>
                        )}

                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-8 transition-all focus-within:ring-2 focus-within:ring-indigo-100">
                            <div className="flex justify-between items-center mb-4 text-xs font-black text-slate-400 uppercase tracking-widest">
                                <span>事故經過描述 / incident case</span>
                                <button onClick={() => setFormData({description:'', analysis:null})} className="hover:text-indigo-600 font-bold px-2 py-1">清空</button>
                            </div>
                            <textarea 
                                placeholder="請輸入詳細經過描述..."
                                value={formData.description}
                                onChange={e => setFormData({...formData, description: e.target.value})}
                                disabled={loading}
                                className="w-full h-40 p-5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none resize-none transition-all text-slate-700 font-medium text-base leading-relaxed"
                            />
                            <button 
                                onClick={handleAnalyze}
                                disabled={loading || !formData.description.trim()}
                                className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg disabled:opacity-50 flex items-center justify-center gap-3 transition-all active:scale-[0.98]"
                            >
                                {loading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Target" />}
                                {loading ? "正在嘗試備援連線..." : "啟動 AI 診斷"}
                            </button>
                        </div>

                        {formData.analysis && (
                            <div className="animate-fade-in bg-white rounded-3xl p-8 shadow-xl border border-slate-200">
                                <div className="flex justify-between items-center mb-8 pb-4 border-b">
                                    <div className="flex items-center gap-3 font-bold text-xl text-slate-800 tracking-tight">
                                        <div className="w-2 h-8 bg-indigo-600 rounded-full" /> 診斷結果摘要
                                    </div>
                                    <div className={`px-4 py-1.5 rounded-full text-xs font-black tracking-wide border ${
                                        formData.analysis.riskLevel === '高' ? 'bg-red-50 text-red-600 border-red-200' : 
                                        formData.analysis.riskLevel === '中' ? 'bg-amber-50 text-amber-600 border-amber-200' : 
                                        'bg-emerald-50 text-emerald-600 border-emerald-200'
                                    }`}>
                                        風險級別：{formData.analysis.riskLevel}
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-6 mb-10">
                                    <div className="p-5 bg-rose-50/50 rounded-2xl border border-rose-100 flex flex-col">
                                        <h4 className="text-rose-600 font-black mb-4 flex items-center gap-2 uppercase tracking-widest"><Icon name="Zap" />直接原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow font-medium italic">
                                            {(formData.analysis.directCauses || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-rose-200">"{c}"</li>)}
                                        </ul>
                                    </div>

                                    <div className="p-5 bg-amber-50/50 rounded-2xl border border-amber-100 flex flex-col">
                                        <h4 className="text-amber-600 font-black mb-4 flex items-center gap-2 uppercase tracking-widest"><Icon name="Cpu" />間接原因</h4>
                                        <div className="space-y-6 flex-grow">
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-700 mb-2 bg-amber-200/50 px-2 py-0.5 rounded w-fit flex items-center gap-1 uppercase tracking-widest">
                                                    <Icon name="AlertTriangle" className="text-[10px]" /> 不安全的狀況
                                                </p>
                                                <ul className="space-y-2 text-slate-700 font-medium">
                                                    {(formData.analysis.unsafeConditions || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-amber-200">{c}</li>)}
                                                </ul>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-700 mb-2 bg-amber-200/50 px-2 py-0.5 rounded w-fit flex items-center gap-1 uppercase tracking-widest">
                                                    <Icon name="UserX" className="text-[10px]" /> 不安全的行為
                                                </p>
                                                <ul className="space-y-2 text-slate-700 font-medium">
                                                    {(formData.analysis.unsafeActs || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-amber-200">{c}</li>)}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 flex flex-col">
                                        <h4 className="text-indigo-600 font-black mb-4 flex items-center gap-2 uppercase tracking-widest"><Icon name="ShieldCheck" />基本原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow font-medium">
                                            {(formData.analysis.basicCauses || []).map((c,i)=><li key={i} className="pl-2 border-l-2 border-indigo-200">{c}</li>)}
                                        </ul>
                                    </div>
                                </div>

                                <section className="bg-emerald-50/50 p-6 rounded-2xl border border-emerald-100">
                                    <h4 className="text-emerald-800 font-black mb-6 flex items-center gap-2 uppercase tracking-widest"><Icon name="Lightbulb" />建議改善對策</h4>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        {(formData.analysis.countermeasures || []).map((m,i)=>(
                                            <div key={i} className="bg-white p-4 rounded-xl border border-emerald-100 text-slate-700 shadow-sm font-semibold flex gap-3 transition-all hover:scale-[1.02]">
                                                <Icon name="CheckCircle2" /> <span>{m}</span>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}
                        <div className="mt-8 text-center text-[10px] text-slate-300 font-black tracking-[0.2em] uppercase">
                            Safety System v3.8 Stable // Multi-Path Failover Enabled
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
