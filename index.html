<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工安助手 - AI 深度分析</title>
    <!-- 核心依賴：Tailwind, React, Babel -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <div class="text-slate-400 font-bold text-lg">安全診斷系統啟動中...</div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, className = "" }) => {
            const icons = {
                ShieldAlert: "🛡️", Sparkles: "✨", Activity: "📈", AlertCircle: "⚠️",
                RefreshCw: "🔄", Loader2: "⏳", Target: "🎯", Zap: "⚡",
                Cpu: "⚙️", ShieldCheck: "✅", Lightbulb: "💡", CheckCircle2: "✔️",
                UserX: "👤", AlertTriangle: "⚠️"
            };
            return <span className={className} style={{ fontSize: '1.2em', lineHeight: '1' }}>{icons[name] || "•"}</span>;
        };

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [formData, setFormData] = useState({
                description: '',
                analysis: null
            });

            const handleAnalyze = async () => {
                if (!formData.description.trim()) return;
                setLoading(true);
                setError(null);

                // --- 🔑 在這裡貼上你的 API Key 🔑 ---
                const rawApiKey = "AIzaSyDV4m5jAx6dHLpydhST2DwhxxzEEeWH_9g"; 
                const apiKey = rawApiKey.trim();
                
                if (!apiKey || apiKey === "在此貼上你的金鑰") {
                    setError("尚未正確填入 API Key。請編輯 index.html 並填入金鑰。");
                    setLoading(false);
                    return;
                }

                const systemPrompt = "你是資深工安專家。分析意外事件並提供專業的「三因分析」（直接原因、間接原因、基本原因）與改善建議。其中「間接原因」必須明確分為「不安全的狀況」與「不安全的行為」。請務必回傳符合 schema 的繁體中文 JSON。";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `分析內容：${formData.description}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        directCauses: { type: "ARRAY", items: { type: "STRING" } },
                                        unsafeConditions: { type: "ARRAY", items: { type: "STRING" } },
                                        unsafeActs: { type: "ARRAY", items: { type: "STRING" } },
                                        basicCauses: { type: "ARRAY", items: { type: "STRING" } },
                                        countermeasures: { type: "ARRAY", items: { type: "STRING" } },
                                        riskLevel: { type: "STRING", enum: ["高", "中", "低"] }
                                    },
                                    required: ["directCauses", "unsafeConditions", "unsafeActs", "basicCauses", "countermeasures", "riskLevel"]
                                }
                            }
                        })
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        const detail = result.error?.message || response.status;
                        throw new Error(`API 請求異常: ${detail}`);
                    }
                    
                    const textContent = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!textContent) throw new Error("AI 回傳內容為空，請檢查 API 限制設定。");

                    const data = JSON.parse(textContent);
                    setFormData(prev => ({ ...prev, analysis: data }));
                } catch (err) {
                    setError("錯誤原因：" + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 flex flex-col md:flex-row text-sm animate-in fade-in duration-500">
                    {/* 側邊欄 */}
                    <aside className="w-full md:w-64 bg-white border-b md:border-r border-slate-200 p-6 flex flex-col shadow-sm">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white shadow-lg flex items-center justify-center">
                                <Icon name="ShieldAlert" />
                            </div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">工安助手</h1>
                        </div>
                        <div className="px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold flex items-center gap-3 border border-indigo-100">
                            <Icon name="Sparkles" /> AI 深度分析
                        </div>
                    </aside>

                    <main className="flex-grow p-6 md:p-10 max-w-5xl mx-auto w-full">
                        <header className="mb-8">
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight">事故診斷報告</h2>
                            <p className="text-slate-500 mt-2 font-medium">請輸入事故經過，由 AI 進行專業歸因分析。</p>
                        </header>

                        {error && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl flex items-center gap-3 shadow-sm">
                                <Icon name="AlertCircle" />
                                <div className="font-bold">{error}</div>
                                <button onClick={() => setError(null)} className="ml-auto p-1 hover:bg-red-100 rounded transition-colors">
                                    <Icon name="RefreshCw" />
                                </button>
                            </div>
                        )}

                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest">事件經過描述</label>
                                <button onClick={() => setFormData({description:'', analysis:null})} className="text-xs text-slate-400 hover:text-indigo-600 font-bold px-2 py-1">清空</button>
                            </div>
                            <textarea 
                                placeholder="例如：搬運物料時因地板濕滑且未穿止滑鞋而跌倒..."
                                value={formData.description}
                                onChange={e => setFormData({...formData, description: e.target.value})}
                                disabled={loading}
                                className="w-full h-40 p-5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none resize-none transition-all text-slate-700 font-medium"
                            />
                            <button 
                                onClick={handleAnalyze}
                                disabled={loading || !formData.description.trim()}
                                className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg disabled:opacity-50 flex items-center justify-center gap-3 transition-all active:scale-[0.98]"
                            >
                                {loading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Target" />}
                                {loading ? "報告產出中..." : "開始 AI 分析診斷"}
                            </button>
                        </div>

                        {formData.analysis && (
                            <div className="bg-white rounded-2xl p-8 shadow-md border border-slate-200 animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center mb-8 pb-4 border-b">
                                    <div className="flex items-center gap-3">
                                        <div className="w-2 h-8 bg-indigo-600 rounded-full" />
                                        <h3 className="text-xl font-bold text-slate-800">事故分析結果</h3>
                                    </div>
                                    <div className="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full font-bold text-xs">
                                        風險級別：{formData.analysis.riskLevel}
                                    </div>
                                </div>
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="p-5 bg-rose-50/50 rounded-xl border border-rose-100 flex flex-col">
                                        <h4 className="text-rose-600 font-black mb-4 flex items-center gap-2 tracking-widest uppercase"><Icon name="Zap" />直接原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow">{formData.analysis.directCauses.map((c,i)=><li key={i} className="pl-2 border-l-2 border-rose-200 italic font-medium">"{c}"</li>)}</ul>
                                    </div>

                                    {/* 間接原因：細分為不安全的狀況與不安全的行為 */}
                                    <div className="p-5 bg-amber-50/50 rounded-xl border border-amber-100 flex flex-col">
                                        <h4 className="text-amber-600 font-black mb-4 flex items-center gap-2 tracking-widest uppercase"><Icon name="Cpu" />間接原因</h4>
                                        <div className="space-y-5 flex-grow">
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-700 mb-2 bg-amber-200/50 px-2 py-0.5 rounded w-fit flex items-center gap-1">
                                                    <Icon name="AlertTriangle" className="text-[10px]" /> 不安全的狀況
                                                </p>
                                                <ul className="space-y-2 text-slate-700">
                                                    {formData.analysis.unsafeConditions.map((c, i) => (
                                                        <li key={i} className="pl-2 border-l-2 border-amber-200 font-medium">{c}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-700 mb-2 bg-amber-200/50 px-2 py-0.5 rounded w-fit flex items-center gap-1">
                                                    <Icon name="UserX" className="text-[10px]" /> 不安全的行為
                                                </p>
                                                <ul className="space-y-2 text-slate-700">
                                                    {formData.analysis.unsafeActs.map((c, i) => (
                                                        <li key={i} className="pl-2 border-l-2 border-amber-200 font-medium">{c}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-5 bg-indigo-50/50 rounded-xl border border-indigo-100 flex flex-col">
                                        <h4 className="text-indigo-600 font-black mb-4 flex items-center gap-2 tracking-widest uppercase"><Icon name="ShieldCheck" />基本原因</h4>
                                        <ul className="space-y-3 text-slate-700 flex-grow">{formData.analysis.basicCauses.map((c,i)=><li key={i} className="pl-2 border-l-2 border-indigo-200 font-medium">{c}</li>)}</ul>
                                    </div>
                                </div>
                                <div className="mt-10 p-6 bg-emerald-50/50 rounded-xl border border-emerald-100">
                                    <h4 className="text-emerald-800 font-black mb-6 flex items-center gap-2 tracking-widest uppercase"><Icon name="Lightbulb" />建議改善對策</h4>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        {formData.analysis.countermeasures.map((m,i)=>(<div key={i} className="bg-white p-4 rounded-xl border border-emerald-100 text-slate-700 shadow-sm flex gap-3 font-medium"><Icon name="CheckCircle2" /><span>{m}</span></div>))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
